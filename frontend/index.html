<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusEvents - HTML/CSS/JS</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Import Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <nav>
    <a href="#" class="brand" id="brand-logo">CampusEvents</a>
    <div class="links" id="nav-links">
      <!-- Dynamically filled by JS -->
    </div>
  </nav>

  <div class="container">
    
    <!-- Home Section (Default View) -->
    <div id="home-section">
      <div style="text-align: center; margin-bottom: 3rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Upcoming Campus Events</h1>
        <p>Discover and register for the best events happening on campus.</p>
      </div>
      <div id="loading-events" class="spinner"></div>
      <div id="events-grid" class="events-grid"></div>
    </div>

    <!-- Auth Section -->
    <div id="auth-section" class="hidden">
      <div class="form-container glass" style="padding: 2rem;">
        <h2 id="auth-title">Welcome Back</h2>
        <form id="auth-form">
          <div class="form-group hidden" id="name-group">
            <label>Name</label>
            <input type="text" id="auth-name" />
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" required />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="auth-password" required />
          </div>
          <div class="form-group hidden" id="role-group">
            <label>Role</label>
            <select id="auth-role">
              <option value="student">Student</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" id="auth-submit-btn">Login</button>
        </form>
        <p class="auth-switch" id="auth-switch-text">
          Don't have an account? <span id="auth-switch-btn">Sign up</span>
        </p>
      </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden">
      <div class="dashboard-header">
        <h2 id="dashboard-title">Dashboard</h2>
        <button id="show-event-form-btn" class="btn btn-primary hidden">Create New Event</button>
      </div>

      <!-- Create Event Form -->
      <div id="create-event-container" class="glass hidden" style="padding: 2rem; margin-bottom: 2rem;">
        <h3>Create Event</h3>
        <form id="create-event-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="event-title" required />
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="event-dept" required />
          </div>
          <div class="form-group">
            <label>Event Date & Time</label>
            <input type="datetime-local" id="event-date" required />
          </div>
          <div class="form-group">
            <label>Registration Deadline</label>
            <input type="datetime-local" id="event-deadline" required />
          </div>
          <div class="form-group">
            <label>Max Participants</label>
            <input type="number" id="event-max" min="1" required />
          </div>
          <div class="form-group" style="grid-column: span 2;">
            <label>Description</label>
            <textarea id="event-desc" rows="3" required></textarea>
          </div>
          <button type="submit" class="btn btn-success" style="grid-column: span 2; background: var(--success); color: white;">Save Event</button>
        </form>
      </div>

      <!-- Participants List Overlay -->
      <div id="participants-container" class="glass hidden" style="padding: 2rem; margin-bottom: 2rem;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <h3>Participants List</h3>
          <button id="close-participants-btn" class="btn btn-danger">Close</button>
        </div>
        <div id="participants-list-body" style="margin-top: 1rem;"></div>
      </div>

      <!-- General Table Grid -->
      <div id="loading-dashboard" class="spinner"></div>
      <div class="glass" style="padding: 1.5rem; overflow-x: auto;">
        <table id="dashboard-table">
          <!-- Filled via JS -->
        </table>
        <p id="dashboard-empty-msg" class="hidden">No records found.</p>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
